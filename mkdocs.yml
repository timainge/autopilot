site_name: autopilot
site_description: Autonomous project session orchestrator for Claude Code
site_url: https://timainge.github.io/autopilot
repo_url: https://github.com/timainge/autopilot
repo_name: timainge/autopilot
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Modes:
    - Plan Mode: modes/plan-mode.md
    - Research Mode: modes/research-mode.md
    - Roadmap Mode: modes/roadmap-mode.md
    - Portfolio Mode: modes/portfolio-mode.md
  - Reference:
    - Manifest Format: manifest-format.md
    - CLI Reference: cli-reference.md
    - Agent Roles: agent-roles.md
  - Contributing: contributing.md

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/timainge/autopilot
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/claude-autopilot/
