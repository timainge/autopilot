site_name: autopilot
site_url: https://timainge.github.io/autopilot/
site_description: The outer loop for Claude Code
repo_url: https://github.com/timainge/autopilot
repo_name: timainge/autopilot

docs_dir: docs/content
site_dir: docs/site

theme:
  name: shadcn
  custom_dir: docs/overrides
  topbar_sections: true

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

extra_css:
  - css/custom.css

extra_javascript:
  - js/theme-toggle.js
  - js/mermaid-init.js

nav:
  - Home: index.md
  - Guides:
      - Guides: guides/index.md
      - Quick Start: guides/quick-start.md
      - Scenarios:
          - Single Task: guides/scenarios/single-task.md
          - Plan & Sprint: guides/scenarios/plan-and-sprint.md
          - Roadmap-Driven: guides/scenarios/roadmap-driven.md
          - Ralph (Autonomous Loop): guides/scenarios/ralph.md
          - Portfolio Overview: guides/scenarios/portfolio.md
  - Reference:
      - Reference: reference/index.md
      - CLI: reference/cli.md
      - Manifest Format: reference/manifest-format.md
      - Agent Roles: reference/agent-roles.md
